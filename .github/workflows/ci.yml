name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    name: ${{ matrix.os }} (${{ matrix.compiler }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc-14
            cc: gcc-14
            cxx: g++-14
          - os: ubuntu-latest
            compiler: clang-18
            cc: clang-18
            cxx: clang++-18
          - os: windows-latest
            compiler: msvc
            # MSVC handles its own environment on GitHub runners
            cc: ""
            cxx: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Compiler (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          if [[ "${{ matrix.compiler }}" == "gcc-14" ]]; then
            sudo apt-get install -y gcc-14 g++-14
          elif [[ "${{ matrix.compiler }}" == "clang-18" ]]; then
            sudo apt-get install -y clang-18
          fi

      - name: Configure CMake
        run: |
          if [[ "${{ matrix.compiler }}" == "msvc" ]]; then
            cmake -B build -S .
          else
            cmake -B build -S . \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_C_COMPILER=${{ matrix.cc }} \
              -DCMAKE_CXX_COMPILER=${{ matrix.cxx }}
          fi

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: |
          cd build
          ctest --output-on-failure -C Release
